name: Doc-test

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  doc-test:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - run: docker pull exercism/factor-test-runner
      - name: Verify introduction.md examples
        run: python3 bin/test-doc-examples
