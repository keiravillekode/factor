name: Doc-test

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  doc-test:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - run: docker pull exercism/factor-test-runner
      - name: Verify introduction.md examples
        run: python3 bin/test-doc-examples
