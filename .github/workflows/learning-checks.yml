name: Learning checks

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  prereq-check:
    name: bin/prereq-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - name: Run bin/prereq-check
        run: bin/prereq-check

  known-words:
    name: bin/extract-known-words + bin/detect-unknown-words concept
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - name: Generate .meta/known-words.md
        run: bin/extract-known-words
      - name: Detect unknown words in exemplars and examples
        run: bin/detect-unknown-words
